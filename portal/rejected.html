<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rejected Applications — Thuvakkam SFS Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/client.js"></script>
  <script src="js/profile.js"></script>
  <style>
    .rejected-card { background: #fff; border: 1px solid var(--grey-100); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; }
    .rejected-card-banner { height: 6px; background: #FEE2E2; }
    .rejected-card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .rejected-reason-box { background: #FEF3C7; border: 1px solid #FDE68A; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #92400E; line-height: 1.5; }
    .rejected-reason-box.empty { color: var(--grey-400); font-style: italic; background: var(--grey-50); border-color: var(--grey-200); }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-accent"></div>
      <div class="topbar-brand">
        Thuvakkam Education
        <span>Sponsor for Success &mdash; Internal Portal</span>
      </div>
    </div>
    <div class="topbar-right">
      <input class="search-input" type="text" placeholder="Search students, schools..." />
      <div class="topbar-divider"></div>
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">--</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-role" id="user-role"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Overview</a>
    <a class="nav-item" href="applications.html"><i class="ti ti-file-text"></i> Applications</a>
    <a class="nav-item" href="selected.html"><i class="ti ti-user-check"></i> Selected Students</a>
    <a class="nav-item active" href="rejected.html"><i class="ti ti-user-x"></i> Rejected</a>
    <a class="nav-item" href="previous.html"><i class="ti ti-clock-history"></i> Previous Beneficiaries</a>

    <div class="nav-section-label">Reports</div>
    <a class="nav-item" href="donor-management.html"><i class="ti ti-heart-handshake"></i> Donor Management</a>
    <a class="nav-item" href="donors.html"><i class="ti ti-chart-bar"></i> Donor Transparency</a>
    <a class="nav-item" href="general-donations.html"><i class="ti ti-cash"></i> General Donations</a>
    <a class="nav-item" href="documents.html"><i class="ti ti-folder"></i> Documents</a>

    <div class="sidebar-footer">
      <a class="nav-item" href="#" onclick="signOut()"><i class="ti ti-logout"></i> Sign out</a>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="page-title">Rejected Applications</div>
        <div class="page-subtitle" id="page-subtitle">SFS 2026 — not shortlisted</div>
      </div>
      <button class="btn btn-outline" onclick="exportRejected()">
        <i class="ti ti-download"></i> Export list
      </button>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <input id="search-input" class="search-input" type="text" placeholder="Search by name or school..." style="width:220px;" />
      <select id="filter-district" class="filter-select">
        <option value="">All districts</option>
      </select>
    </div>

    <!-- Count -->
    <div id="result-count" style="font-size:13px;color:var(--grey-400);margin-bottom:16px;"></div>

    <!-- Cards grid -->
    <div class="student-grid" id="rejected-grid"></div>
  </main>

<script>
let allRejected = [];

function renderCards(data) {
  const grid = document.getElementById('rejected-grid');
  if (!data.length) {
    grid.innerHTML = '<p style="color:var(--grey-400);font-size:13px;padding:24px 0;">No rejected applications found.</p>';
    return;
  }
  grid.innerHTML = data.map(s => `
    <div class="rejected-card">
      <div class="rejected-card-banner"></div>
      <div class="rejected-card-body">
        <div style="display:flex;align-items:center;gap:14px;">
          <div class="table-avatar" style="width:44px;height:44px;font-size:16px;flex-shrink:0;">${s.initials || s.name.slice(0,2).toUpperCase()}</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:var(--black);">${s.name}</div>
            <div style="font-size:12px;color:var(--grey-400);margin-top:2px;">${s.school}</div>
          </div>
        </div>
        <div class="student-meta">
          <div class="student-meta-row"><span class="student-meta-key">District</span><span class="student-meta-val">${s.district}</span></div>
          <div class="student-meta-row"><span class="student-meta-key">Applied</span><span class="student-meta-val">${fmtDate(s.applied_on)}</span></div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--grey-400);margin-bottom:6px;">Rejection reason</div>
          <div class="rejected-reason-box ${s.rejection_reason ? '' : 'empty'}">
            ${s.rejection_reason || 'No reason added yet'}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:auto;">
          <button class="btn btn-outline btn-sm" style="flex:1;" onclick="openProfile('${s.id}', 'rejected')">
            <i class="ti ti-eye"></i> View & edit reason
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function applyFilters() {
  const search   = document.getElementById('search-input').value.toLowerCase().trim();
  const district = document.getElementById('filter-district').value;
  const filtered = allRejected.filter(s =>
    (!search   || s.name.toLowerCase().includes(search) || s.school.toLowerCase().includes(search)) &&
    (!district || s.district === district)
  );
  renderCards(filtered);
  document.getElementById('result-count').textContent = `Showing ${filtered.length} of ${allRejected.length} rejected applications`;
}

function populateDistricts(data) {
  const districts = [...new Set(data.map(s => s.district))].sort();
  const sel = document.getElementById('filter-district');
  sel.innerHTML = '<option value="">All districts</option>' +
    districts.map(d => `<option value="${d}">${d}</option>`).join('');
}

function exportRejected() {
  if (!allRejected.length) return;
  const esc  = v => `"${String(v ?? '').replace(/"/g,'""')}"`;
  const headers = ['Name','School','District','Applied On','Rejection Reason'];
  const rows = allRejected.map(s => [
    s.name, s.school, s.district, fmtDate(s.applied_on), s.rejection_reason
  ].map(esc).join(','));
  const csv  = '﻿' + [headers.map(esc).join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `SFS2026_Rejected_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function loadRejected() {
  await requireAuth();
  const { data } = await sb.from('students').select('*')
    .eq('cycle_year', 2026).eq('status', 'rejected').order('name');
  if (!data) return;
  allRejected = data;
  document.getElementById('result-count').textContent = `${data.length} rejected applications`;
  populateDistricts(data);
  renderCards(data);
  document.getElementById('search-input').addEventListener('input',    applyFilters);
  document.getElementById('filter-district').addEventListener('change', applyFilters);
}

loadRejected();
</script>

</body>
</html>
