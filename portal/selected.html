<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selected Students — Thuvakkam SFS Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/client.js"></script>
  <script src="js/profile.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-accent"></div>
      <div class="topbar-brand">
        Thuvakkam Education
        <span>Sponsor for Success &mdash; Internal Portal</span>
      </div>
    </div>
    <div class="topbar-right">
      <input class="search-input" type="text" placeholder="Search students, schools..." />
      <div class="topbar-divider"></div>
      <div class="user-pill">
        <div class="user-avatar">RK</div>
        <div class="user-info">
          <div class="user-name">Ramesh Kumar</div>
          <div class="user-role">Committee Member</div>
        </div>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="dashboard.html">
      <i class="ti ti-layout-dashboard"></i> Overview
    </a>
    <a class="nav-item" href="applications.html">
      <i class="ti ti-file-text"></i> Applications
    </a>
    <a class="nav-item active" href="selected.html">
      <i class="ti ti-user-check"></i> Selected Students
    </a>
    <a class="nav-item" href="rejected.html"><i class="ti ti-user-x"></i> Rejected</a>
    <a class="nav-item" href="previous.html">
      <i class="ti ti-clock-history"></i> Previous Beneficiaries
    </a>

    <div class="nav-section-label">Reports</div>
    <a class="nav-item" href="donors.html">
      <i class="ti ti-heart-handshake"></i> Donor Transparency
    </a>
    <a class="nav-item" href="documents.html">
      <i class="ti ti-folder"></i> Documents
    </a>

    <div class="sidebar-footer">
      <a class="nav-item" href="#" onclick="signOut()"><i class="ti ti-logout"></i> Sign out</a>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="main">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="page-title">Selected Students</div>
        <div class="page-subtitle">112 students selected for SFS 2026 scholarship</div>
      </div>
      <button class="btn btn-primary" data-action="export-list"><i class="ti ti-download"></i> Export list</button>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <select id="filter-district" class="filter-select">
        <option value="">All districts</option>
      </select>
      <select id="filter-class" class="filter-select">
        <option value="">All classes</option>
        <option>9th</option>
        <option>10th</option>
        <option>11th</option>
        <option>12th</option>
      </select>
    </div>

    <!-- Cards grid -->
    <div class="student-grid" id="student-grid"></div>
  </main>

<script>
let allSelected = [];

/* ── RENDER CARDS ─────────────────────────────────────── */
function renderCards(data) {
  const grid = document.getElementById('student-grid');
  if (!data.length) {
    grid.innerHTML = '<p style="color:var(--grey-400);font-size:13px;padding:24px 0;">No students match the selected filters.</p>';
    return;
  }
  grid.innerHTML = data.map(s => `
    <div class="student-card">
      <div class="student-card-banner"></div>
      <div class="student-card-body">
        <div class="student-initials">${s.initials || s.name.slice(0,2).toUpperCase()}</div>
        <div class="student-name">${s.name}</div>
        <div class="student-school">${s.school}</div>
        <div class="student-meta">
          <div class="student-meta-row"><span class="student-meta-key">District</span><span class="student-meta-val">${s.district}</span></div>
          <div class="student-meta-row"><span class="student-meta-key">Class</span><span class="student-meta-val">${s.class}</span></div>
          <div class="student-meta-row"><span class="student-meta-key">Applied</span><span class="student-meta-val">${fmtDate(s.applied_on)}</span></div>
        </div>
        <div class="student-card-footer">
          <button class="btn-view-profile" onclick="openProfile('${s.id}', 'selected')">View profile</button>
        </div>
      </div>
    </div>
  `).join('');
}

/* ── FILTERS ──────────────────────────────────────────── */
function applyFilters() {
  const district = document.getElementById('filter-district').value;
  const cls      = document.getElementById('filter-class').value;
  const filtered = allSelected.filter(s =>
    (!district || s.district === district) &&
    (!cls      || s.class    === cls)
  );
  renderCards(filtered);
}

/* ── POPULATE DISTRICT DROPDOWN ───────────────────────── */
function populateDistricts(data) {
  const districts = [...new Set(data.map(s => s.district))].sort();
  const sel = document.getElementById('filter-district');
  sel.innerHTML = '<option value="">All districts</option>' +
    districts.map(d => `<option value="${d}">${d}</option>`).join('');
}

/* ── VIEW PROFILE MODAL ───────────────────────────────── */
function viewStudent(id) {
  const s = allSelected.find(x => x.id === id);
  if (!s) return;

  const existing = document.getElementById('view-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'view-modal';
  modal.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:9999;" onclick="if(event.target===this)this.remove()">
      <div style="background:#fff;border-radius:12px;width:100%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,0.16);font-family:var(--font);overflow:hidden;">
        <div style="background:var(--green-dark);padding:24px 28px;display:flex;align-items:center;gap:16px;">
          <div style="width:52px;height:52px;border-radius:10px;background:var(--yellow);color:var(--green-dark);font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            ${s.initials || s.name.slice(0,2).toUpperCase()}
          </div>
          <div>
            <div style="font-size:18px;font-weight:700;color:#fff;">${s.name}</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:2px;">${s.school}</div>
          </div>
          <button onclick="document.getElementById('view-modal').remove()" style="margin-left:auto;background:rgba(255,255,255,0.15);border:none;border-radius:6px;width:32px;height:32px;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;">
            <i class="ti ti-x"></i>
          </button>
        </div>
        <div style="padding:24px 28px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
            ${[
              ['District',   s.district],
              ['Class',      s.class],
              ['Cycle',      s.cycle_year],
              ['Applied on', fmtDate(s.applied_on)],
            ].map(([k,v]) => `
              <div style="background:var(--grey-50);border-radius:6px;padding:12px 14px;">
                <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--grey-400);margin-bottom:4px;">${k}</div>
                <div style="font-size:14px;font-weight:500;color:var(--black);">${v}</div>
              </div>`).join('')}
          </div>
          <div style="padding:13px 16px;background:var(--status-selected-bg);border-radius:6px;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:13px;color:var(--status-selected-txt);font-weight:600;">Status: Selected for SFS ${s.cycle_year}</span>
            <span class="badge badge-selected">Selected</span>
          </div>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

/* ── EXPORT LIST ──────────────────────────────────────── */
function exportList() {
  const district = document.getElementById('filter-district').value;
  const cls      = document.getElementById('filter-class').value;
  const data = allSelected.filter(s =>
    (!district || s.district === district) &&
    (!cls      || s.class    === cls)
  );

  const headers = ['Name', 'School', 'District', 'Class', 'Applied On', 'Cycle'];
  const rows = data.map(s => [
    s.name, s.school, s.district, s.class, fmtDate(s.applied_on), s.cycle_year
  ].map(v => `"${v}"`).join(','));

  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `SFS2026_Selected_Students_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

/* ── LOAD ─────────────────────────────────────────────── */
async function loadSelected() {
  await requireAuth();

  const { data } = await sb.from('students').select('*')
    .eq('cycle_year', 2026).eq('status', 'selected').order('name');

  if (!data) return;
  allSelected = data;

  populateDistricts(data);
  renderCards(data);

  document.getElementById('filter-district').addEventListener('change', applyFilters);
  document.getElementById('filter-class').addEventListener('change', applyFilters);
  document.querySelector('[data-action="export-list"]').addEventListener('click', exportList);
}

loadSelected();
</script>

</body>
</html>
